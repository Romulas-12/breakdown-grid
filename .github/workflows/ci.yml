name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      # The build needs the Atlassian Plugin SDK: some transitive deps (e.g. jta:jta:1.0.1)
      # are not publicly downloadable and ship bundled with the SDK's repository.
      - name: Install Atlassian Plugin SDK
        run: |
          curl -fsSL https://packages.atlassian.com/api/gpg/key/public \
            | sudo gpg --dearmor -o /usr/share/keyrings/atlassian.gpg
          echo "deb [signed-by=/usr/share/keyrings/atlassian.gpg] https://packages.atlassian.com/debian/atlassian-sdk-deb/ stable contrib" \
            | sudo tee /etc/apt/sources.list.d/atlassian-sdk.list
          sudo apt-get update
          sudo apt-get install -y atlassian-plugin-sdk

      - name: Unit tests
        run: atlas-unit-test -B
